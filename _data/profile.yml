short_bio: >-
  <p>
    I am a Ph.D. student in Computer Science and Technology at <a href="https://www.ahu.edu.cn/" target="_blank">Anhui University</a>, where I also completed my undergraduate studies. My research focuses on <strong>large-scale multi-objective optimization</strong>, <strong>sparse optimization</strong>, and <strong>automated machine learning</strong>.
  </p>
  <p>
    I have published more than ten papers as the first author in top international journals and conferences, including IEEE TEVC, IEEE TCYB, IEEE TETCI, ACM CSUR, and IEEE CEC, with 3 papers having an impact factor exceeding 10 and 1 ESI highly cited hot paper. I received the Best Paper Award at the 18th BIC-TA International Conference, was selected for the <em>Chinese Association for Science and Technology Young Talent Program (Doctoral Special)</em>, and am the principal investigator of a natural science project funded by the Anhui Provincial Department of Education.
  </p>

